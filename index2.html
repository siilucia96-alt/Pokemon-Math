<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokemon Math Battle</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family: Arial;
    text-align:center;
}

canvas {
    background:#0a0a1e;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ✅ GAME STATE
let state = "select";
let playerPokemon = "";

// ✅ IMAGES
let images = {
    "Pikachu": new Image(),
    "Charmander": new Image(),
    "Bulbasaur": new Image(),
    "Enemy": new Image()
};

images["Pikachu"].src = "pikachu.jpeg";
images["Charmander"].src = "charmander.jpeg";
images["Bulbasaur"].src = "bulbasaur.jpeg";
images["Enemy"].src = "enemy.jpeg";

// ✅ ENEMY
let enemyHP = 100;

// ✅ QUESTION
let num1=0, num2=0, correctAnswer=0, userInput="";

// ✅ OPTIONS
const pokemons = ["Pikachu","Charmander","Bulbasaur"];

// ✅ EFFECTS
let hitEffect = 0;
let damageText = "";
let damageY = 0;
let enemyShake = 0;

// ✅ NEW QUESTION
function newQuestion(){
    num1 = Math.floor(Math.random()*10)+1;
    num2 = Math.floor(Math.random()*10)+1;
    correctAnswer = num1 + num2;
    userInput="";
}

// ✅ KEY INPUT
document.addEventListener("keydown",(e)=>{

    if(state==="battle"){

        if(!isNaN(e.key)) userInput+=e.key;

        if(e.key==="Backspace"){
            userInput=userInput.slice(0,-1);
        }

        if(e.key==="Enter"){
            if(parseInt(userInput)===correctAnswer){

                // ✅ DAMAGE
                enemyHP-=20;
                if(enemyHP<0) enemyHP=0;

                // ✅ EFFECTS
                hitEffect = 10;
                enemyShake = 10;
                damageText = "-20";
                damageY = 120;

                newQuestion();
            }else{
                userInput="";
            }
        }
    }
});

// ✅ CLICK SELECT
canvas.addEventListener("click",(e)=>{

    if(state==="select"){

        let x=e.offsetX;
        let y=e.offsetY;

        pokemons.forEach((p,i)=>{

            if(x>100+i*150 && x<200+i*150 &&
               y>200 && y<300){

                playerPokemon=p;
                state="battle";
                newQuestion();
            }

        });
    }
});

// ✅ LOOP
function update(){

    ctx.clearRect(0,0,600,400);

    // ✅ FLASH EFFECT
    if(hitEffect>0){
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.fillRect(0,0,600,400);
    }

    // ✅ SELECT
    if(state==="select"){

        ctx.fillStyle="white";
        ctx.font="24px Arial";
        ctx.fillText("Choose Your Pokemon",150,80);

        pokemons.forEach((p,i)=>{
            ctx.drawImage(images[p],100+i*150,200,100,100);
        });
    }

    // ✅ BATTLE
    if(state==="battle"){

        ctx.fillStyle="white";
        ctx.font="16px Arial";

        // ✅ PLAYER
        ctx.drawImage(images[playerPokemon],50,230,100,100);

        // ✅ ENEMY (with shake)
        let shakeX = enemyShake>0 ? Math.random()*10-5 : 0;
        let shakeY = enemyShake>0 ? Math.random()*10-5 : 0;

        ctx.drawImage(images["Enemy"],450+shakeX,80+shakeY,100,100);

        // HP
        ctx.fillText("Enemy HP: "+enemyHP,400,60);

        // QUESTION
        ctx.font="28px Arial";
        ctx.fillText(num1+" + "+num2+" = ?",200,180);

        // INPUT
        ctx.fillText(userInput,280,230);

        // DAMAGE TEXT
        if(damageText!==""){
            ctx.fillStyle="red";
            ctx.font="22px Arial";
            ctx.fillText(damageText,480,damageY);
        }

        // WIN
        if(enemyHP===0){
            ctx.fillStyle="lime";
            ctx.font="30px Arial";
            ctx.fillText("YOU WIN!",220,300);
        }
    }

    // ✅ EFFECT DECAY
    if(hitEffect>0) hitEffect--;
    if(enemyShake>0) enemyShake--;

    if(damageText!==""){
        damageY-=1;
        if(damageY<80){
            damageText="";
        }
    }

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
