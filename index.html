<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokemon Math Battle</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family: Arial;
    text-align:center;
}
canvas {
    background:#0a0a1e;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<!-- ✅ bigger canvas for keypad -->
<canvas id="game" width="600" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ✅ STATE
let state = "select";
let playerPokemon = "";

// ✅ IMAGES
let images = {
    "Pikachu": new Image(),
    "Charmander": new Image(),
    "Bulbasaur": new Image(),
    "Enemy": new Image()
};

images["Pikachu"].src = "pikachu.jpeg";
images["Charmander"].src = "charmander.jpeg";
images["Bulbasaur"].src = "bulbasaur.jpeg";
images["Enemy"].src = "enemy.jpeg";

// ✅ GAME DATA
let enemyHP = 100;
let num1=0, num2=0, correctAnswer=0, userInput="";
let pokemons = ["Pikachu","Charmander","Bulbasaur"];

// ✅ EFFECTS
let hitEffect = 0;
let damageText = "";
let damageY = 0;
let enemyShake = 0;

// ✅ KEYPAD
let keypad = [
    {n:"1",x:200,y:260},{n:"2",x:260,y:260},{n:"3",x:320,y:260},
    {n:"4",x:200,y:310},{n:"5",x:260,y:310},{n:"6",x:320,y:310},
    {n:"7",x:200,y:360},{n:"8",x:260,y:360},{n:"9",x:320,y:360},
    {n:"0",x:260,y:410}
];

let btnDel = {x:380,y:260,w:60,h:40};
let btnEnterBtn = {x:380,y:320,w:60,h:40};

// ✅ NEW QUESTION
function newQuestion(){
    num1 = Math.floor(Math.random()*10)+1;
    num2 = Math.floor(Math.random()*10)+1;
    correctAnswer = num1 + num2;
    userInput="";
}

// ✅ KEYBOARD (PC)
document.addEventListener("keydown",(e)=>{

    if(state==="battle"){

        if(!isNaN(e.key)) userInput+=e.key;

        if(e.key==="Backspace") userInput=userInput.slice(0,-1);

        if(e.key==="Enter") checkAnswer();
    }
});

// ✅ CLICK / TOUCH
canvas.addEventListener("click",(e)=>{

    let x=e.offsetX;
    let y=e.offsetY;

    // ✅ SELECT
    if(state==="select"){
        pokemons.forEach((p,i)=>{
            if(x>100+i*150 && x<200+i*150 && y>180 && y<280){
                playerPokemon=p;
                state="battle";
                newQuestion();
            }
        });
    }

    // ✅ KEYPAD
    if(state==="battle"){

        keypad.forEach(b=>{
            if(x>b.x && x<b.x+50 && y>b.y && y<b.y+40){
                userInput+=b.n;
            }
        });

        if(x>btnDel.x && x<btnDel.x+btnDel.w &&
           y>btnDel.y && y<btnDel.y+btnDel.h){
            userInput=userInput.slice(0,-1);
        }

        if(x>btnEnterBtn.x && x<btnEnterBtn.x+btnEnterBtn.w &&
           y>btnEnterBtn.y && y<btnEnterBtn.y+btnEnterBtn.h){
            checkAnswer();
        }
    }

});

// ✅ CHECK ANSWER
function checkAnswer(){

    if(parseInt(userInput)===correctAnswer){

        enemyHP -= 20;
        if(enemyHP < 0) enemyHP = 0;

        hitEffect = 10;
        enemyShake = 10;
        damageText = "-20";
        damageY = 120;

        newQuestion();
    }else{
        userInput="";
    }
}

// ✅ LOOP
function update(){

    ctx.clearRect(0,0,600,500);

    // ✅ FLASH
    if(hitEffect>0){
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.fillRect(0,0,600,500);
    }

    // ✅ SELECT
    if(state==="select"){

        ctx.fillStyle="white";
        ctx.font="24px Arial";
        ctx.fillText("Choose Your Pokemon",150,80);

        pokemons.forEach((p,i)=>{
            let img = images[p];

            if(img.complete){
                ctx.drawImage(img,100+i*150,180,100,100);
            }else{
                ctx.fillStyle="green";
                ctx.fillRect(100+i*150,180,100,100);
                ctx.fillStyle="black";
                ctx.fillText(p,110+i*150,230);
            }
        });
    }

    // ✅ BATTLE
    if(state==="battle"){

        ctx.fillStyle="white";
        ctx.font="16px Arial";

        // PLAYER
        let pImg = images[playerPokemon];
        if(pImg.complete){
            ctx.drawImage(pImg,50,220,100,100);
        }else{
            ctx.fillText(playerPokemon,50,260);
        }

        // ENEMY
        let shakeX = enemyShake>0 ? Math.random()*10-5 : 0;
        let shakeY = enemyShake>0 ? Math.random()*10-5 : 0;

        let eImg = images["Enemy"];
        if(eImg.complete){
            ctx.drawImage(eImg,450+shakeX,80+shakeY,100,100);
        }else{
            ctx.fillStyle="red";
            ctx.fillRect(450,80,100,100);
            ctx.fillStyle="white";
            ctx.fillText("Enemy",460,130);
        }

        // HP
        ctx.fillText("Enemy HP: "+enemyHP,400,60);

        // QUESTION
        ctx.font="26px Arial";
        ctx.fillText(num1+" + "+num2+" = ?",200,150);

        // INPUT
        ctx.fillText(userInput,280,200);

        // DAMAGE
        if(damageText!==""){
            ctx.fillStyle="red";
            ctx.fillText(damageText,480,damageY);
        }

        // ✅ KEYPAD DRAW
        ctx.fillStyle="white";
        keypad.forEach(b=>{
            ctx.strokeRect(b.x,b.y,50,40);
            ctx.fillText(b.n,b.x+18,b.y+25);
        });

        ctx.strokeRect(btnDel.x,btnDel.y,btnDel.w,btnDel.h);
        ctx.fillText("DEL",btnDel.x+8,btnDel.y+25);

        ctx.strokeRect(btnEnterBtn.x,btnEnterBtn.y,btnEnterBtn.w,btnEnterBtn.h);
        ctx.fillText("OK",btnEnterBtn.x+15,btnEnterBtn.y+25);

        if(enemyHP===0){
            ctx.fillStyle="lime";
            ctx.font="30px Arial";
            ctx.fillText("YOU WIN!",220,320);
        }
    }

    // ✅ EFFECT DECAY
    if(hitEffect>0) hitEffect--;
    if(enemyShake>0) enemyShake--;

    if(damageText!==""){
        damageY--;
        if(damageY<80) damageText="";
    }

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
